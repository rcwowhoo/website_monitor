version: '1.0'
name: daily-scraper
displayName: Daily Scraper

triggers:
  schedule:
    # 【注意】Gitee Go 使用北京时间！直接写 9:00 和 16:00
    # 格式：秒 分 时 日 月 周
    - cron: '0 0 1 * * ?'
    - cron: '0 0 8 * * ?'

stages:
  - name: run-scraper-stage
    displayName: 运行抓取器
    steps:
      # Gitee Go 默认会自动拉取当前仓库代码，无需像 GitHub 那样写 checkout 步骤
      
      - step: build@python
        name: setup-and-run
        displayName: 环境配置与运行
        inputs:
          pythonVersion: '3.10'
          commands: |
            # 1. 安装依赖
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            
            # 2. 安装 Playwright 浏览器
            playwright install-deps chromium
            playwright install chromium
            
            # 3. 运行脚本
            python main.py
            
        env:
          # 【注意】Gitee Go 使用 ${变量名} 格式引用环境变量
          SMTP_SERVER: ${SMTP_SERVER}
          SMTP_PORT: ${SMTP_PORT}
          SENDER_EMAIL: ${SENDER_EMAIL}
          EMAIL_PASSWORD: ${EMAIL_PASSWORD}
          RECEIVER_EMAIL: ${RECEIVER_EMAIL}