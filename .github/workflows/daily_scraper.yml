name: Daily Scraper

on:
  schedule:
    # 每天北京时间 18:00 运行 (UTC 时间 10:00)
    - cron: '0 10 * * *'
  # 允许手动在 GitHub 页面上触发运行
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk-bridge2.0-0 libatk1.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxext6 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Run Scraper
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python main.py
